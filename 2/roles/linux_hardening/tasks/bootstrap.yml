---
- name: Check python3 exists
  raw: "command -v python3 >/dev/null 2>&1"
  register: python_check
  changed_when: false
  failed_when: false

- name: Install python3 if missing (Debian/RedHat via pkg mgr detection)
  raw: |
    set -e
    if command -v python3 >/dev/null 2>&1; then exit 0; fi

    if command -v apt-get >/dev/null 2>&1; then
      apt-get update -y
      DEBIAN_FRONTEND=noninteractive apt-get install -y python3 python3-apt
    elif command -v dnf >/dev/null 2>&1; then
      dnf install -y python3
    elif command -v yum >/dev/null 2>&1; then
      yum install -y python3
    else
      echo "No supported package manager found" >&2
      exit 1
    fi
  when: python_check.rc != 0