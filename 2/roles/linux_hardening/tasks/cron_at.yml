---
- name: Remove cron.deny if exists
  file:
    path: /etc/cron.deny
    state: absent

- name: Remove at.deny if exists
  file:
    path: /etc/at.deny
    state: absent

- name: Create cron.allow
  file:
    path: /etc/cron.allow
    state: touch
    owner: root
    group: root
    mode: "0600"

- name: Create at.allow
  file:
    path: /etc/at.allow
    state: touch
    owner: root
    group: root
    mode: "0600"