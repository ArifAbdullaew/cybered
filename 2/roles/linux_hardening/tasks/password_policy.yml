- name: Get local users with UID >= 1000
  command: >
    awk -F: '$3 >= 1000 {print $1}' /etc/passwd
  register: local_users
  changed_when: false

- name: Apply password aging policy
  command: chage -m 1 -M 90 {{ item }}
  loop: "{{ local_users.stdout_lines }}"
  when: item != "nobody"

- name: Set INACTIVE in useradd defaults
  lineinfile:
    path: /etc/default/useradd
    regexp: '^INACTIVE'
    line: 'INACTIVE=90'