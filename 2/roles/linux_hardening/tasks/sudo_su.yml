- name: Ensure sudoers.d directory exists
  file:
    path: /etc/sudoers.d
    state: directory
    mode: '0755'

- name: Configure sudo base security settings
  copy: 
    dest: /etc/sudoers.d/00-hardening
    content: | 
      Defaults use_pty
      Defaults logfile="{{ hardening_sudo_logfile }}"
    owner: root
    group: root
    mode: '0440'
  validate: 'visudo -cf %s'

- name: Create restricted sudo group 
  group: 
    name: "{{ hardening_sudo_group }}"
    state: present
  when: hardening_sudo_whitelist_enable | bool

- name: Add users to restricted sudo group
  user:
    name: "{{ hardening_sudo_user }}"
    groups: "{{ hardening_sudo_group }}"
    append: yes
  when: 
    - hardening_sudo_whitelist_enable | bool
    - hardening_sudo_user | length > 0

- name: Configure whitelist sudo command 
  copy:
    dest: /etc/sudoers.d/{{ hardening_sudo_group }}
    content: |
      %{{ hardening_sudo_group }} ALL=(ALL) NOPASSWD: {{ hardening_sudo_commands | join(',') }}
    owner: root
    group: root
    mode: '0440'
  when: hardening_sudo_whitelist_enable | bool
  validate: 'visudo -cf %s'

- name: Ensure nose group exists
  group:
    name: "{{ hardening_su_deny_group }}"
    state: present
  when: hardening_su_restrict | bool

- name: Restrict su command via PAM
  lineinfile:
    path: /etc/pam.d/su
    regexp: '^auth\s+required\s+pam_wheel.so'
    line: "auth required pam_wheel.so deny group={{ hardening_su_deny_group }} use_uid"
    insertafter: EOF
  when: hardening_su_restrict | bool